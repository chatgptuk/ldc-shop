name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Sync Upstream
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            try {
              // Backup user's wrangler.json files (if exists and contains database_id)
              const wranglerPaths = ['_workers_next/wrangler.json', 'wrangler.json'];
              const backups = {};

              for (const wranglerPath of wranglerPaths) {
                if (fs.existsSync(wranglerPath)) {
                  const content = fs.readFileSync(wranglerPath, 'utf8');
                  if (content.includes('d1_databases')) {
                    backups[wranglerPath] = content;
                    console.log(`📦 Backed up ${wranglerPath} with D1 config`);
                  }
                }
              }

              let userWrangler = backups['_workers_next/wrangler.json'] || null;
              
              // Configure Git
              await exec.exec('git', ['config', '--global', 'user.name', 'GitHub Actions']);
              await exec.exec('git', ['config', '--global', 'user.email', 'actions@github.com']);

              // Add Upstream
              await exec.exec('git', ['remote', 'add', 'upstream', 'https://github.com/chatgptuk/ldc-shop.git']);
              await exec.exec('git', ['fetch', 'upstream']);

              // Hard Reset to Upstream Main
              await exec.exec('git', ['checkout', 'main']);
              await exec.exec('git', ['reset', '--hard', 'upstream/main']);
              
              // Restore user's wrangler.json files if backed up
              const filesToRestore = [];
              if (userWrangler) {
                fs.writeFileSync('_workers_next/wrangler.json', userWrangler);
                filesToRestore.push('_workers_next/wrangler.json');
              }
              if (backups['wrangler.json']) {
                fs.writeFileSync('wrangler.json', backups['wrangler.json']);
                filesToRestore.push('wrangler.json');
              }

              if (filesToRestore.length > 0) {
                for (const f of filesToRestore) {
                  await exec.exec('git', ['add', f]);
                }
                
                // Check if there are actual changes to commit
                let hasChanges = false;
                try {
                  await exec.exec('git', ['diff', '--cached', '--quiet']);
                } catch (e) {
                  // git diff --quiet returns exit code 1 if there are changes
                  hasChanges = true;
                }
                
                if (hasChanges) {
                  await exec.exec('git', ['commit', '-m', 'chore: preserve user wrangler.json config']);
                  console.log('✅ Restored user wrangler.json with D1 config');
                } else {
                  console.log('ℹ️ User wrangler.json is identical to upstream, no commit needed');
                }
              }

              // Force Push
              await exec.exec('git', ['push', 'origin', 'main', '--force']);
              
            } catch (error) {
              core.setFailed(`Sync failed: ${error.message}`);
            }
